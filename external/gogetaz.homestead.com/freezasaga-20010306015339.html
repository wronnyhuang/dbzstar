lma's father, Gokou travels to Namek. At the same time, the deceased Yamcha, Tenshin-han, Chauzu, and Piccolo are training with Kaiou. Meanwhile, Vegeta begins his fight against Freeza. With strategic actions, Vegeta kills Dodorian and Zarbon, Freeza's right and left hand men, and steals the captured dragonballs from Freeza. However, Vegeta learned from Dodorian that the Saiyan planet was not destroyed by a meteor as stated, but by Freeza. Ambitions to kill Freeza are strengthened. Freeza learns of Vegeta's betrayal and calls forth the Ginew Squad. Team Ginew, consisting of five members who constantly pose in funny dances, have a reputation as being powerful warriors of destruction. Gokou finally lands on Namek. The Z warriors now have a new enemy, one who must be defeated for the safety of the entire galaxy. Everyone plans to defeat Freeza, but Freeza is too strong. Realizing that he himself cannot defeat Freeza, Vegeta joins the Z warriors, but boasts that it is only to insure that Gokou survives the battle so that he could kill him personally. (However, Vegeta ends up marrying Bulma, and Bulma gets pregnant a son that would become known as Trunks.) Team Ginew is killed by the combined forces of Gokou and Vegeta (except for Ginew, who accidently turned into a frog when he tried to swap bodies with Vegeta and Gokou threw a frog in his path). Then, follows the fights against Freeza himself. To everyone's surprise, Freeza has the ability to transform into a few stages. With each pysical transformation, Freeza's power increases. Klilyn is killed in battle and Gokou becomes enraged in an anger so deep that he too undergoes a transformational powerup. Gokou's hair becomes golden and spikes up, and he reaches Super Saiyan level for the first time. The tides of battle now turn to Gokou. With a single energy blast, Freeza and his planet are blown. Freeza learns the true powers behind a Super Saiyan. The Z warriors are back on Earth. The dead Z warriors are granted back to life. Everyone thinks that Gokou was killed in battle, but Gokou really escaped to planet Yardrat, where he learned how to teleport. Cold, Freeza's father, learns about Freeza's defeat and quickly gathers Freeza's body parts, which are floating around in space. His henchmen quickly re-ensemble Freeza. (This is why Freeza was half robotic.) Freeza tells his father about Gokou and his powers, but his father doesn't believe him. Cold continues to boast that he is the universe's strongest warrior and best space conquerer, and can never be defeated.</FONT></FONT></DIV></TD></TR></DIV></TABLE>
