ur heroes get kicked around, but Vegeta later gets his tail cut off by Yajirobe. Gokou donates energy from his Tenki-Dama to Klilyn. This fireball hits Vegeta, but Vegeta survives. Meanwhile, Gohan's tail grows back. Gohan turns into his full moon stage and kicks Vegeta around. Later, Gohan gets his tail cut off by Vegeta and finally turns back into a little boy... landing right on top of Vegeta. Vegeta, weary and defeated, crawls to his space shuttle and leaves Earth. This is not the end of Vegeta... </FONT></FONT></DIV></TD></TR></DIV></TABLE>
